name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Grants permission for MkDocs to push to the gh-pages branch
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -
        
      - name: Install dependencies
        run: poetry install
        
      - name: Lint with Ruff
        run: poetry run python3 -m ruff check .
        
      - name: Check formatting with Ruff
        run: poetry run python3 -m ruff format --check .
        
      - name: Run tests
        run: poetry run python3 -m pytest

  deploy-docs:
    # Only run this job if the 'test' job passes completely
    needs: test
    # Only deploy docs if the code was pushed/merged directly to the main branch
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -
        
      - name: Install dependencies
        run: poetry install
        
      - name: Deploy MkDocs to GitHub Pages
        run: poetry run python3 -m mkdocs gh-deploy --force