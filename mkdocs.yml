site_name: RDCE Documentation
site_description: A blazing fast, zero-dependency contract enforcement engine for Python dictionaries and flat-files.
theme:
  name: material
  palette:
    primary: indigo
    accent: blue

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]

nav:
  - Home: index.md
  - API Reference:
    - Engine: api/engine.md
    - Adapters: api/adapters.md